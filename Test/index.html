<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Detector</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b0b0d;
  color:white;
  font-family:-apple-system,system-ui,sans-serif;
  text-align:center;
}

.box{
  padding:24px;
  border-radius:18px;
  background:#1c1c1e;
  border:1px solid #2a2a2c;
  width:280px;
}

h1{
  margin:0 0 14px;
  font-size:1.2rem;
}

.version{
  font-size:2rem;
  font-weight:700;
  color:#6aa9ff;
}

.ua{
  margin-top:18px;
  font-size:.7rem;
  color:#9a9aa1;
  word-break:break-word;
}
</style>
</head>

<body>

<div class="box">
  <h1>Detected iOS Version</h1>
  <div class="version" id="version">Checking...</div>
  <div class="ua" id="ua"></div>
</div>

<script>
const ua = navigator.userAgent;

const match = ua.match(/OS (\d+)[._](\d+)/);

let iosVersion = "Not detected";

if(match){
  iosVersion = `${match[1]}.${match[2]}`;
}

document.getElementById("version").textContent = iosVersion;
document.getElementById("ua").textContent = ua;
</script>

</body>
</html>
